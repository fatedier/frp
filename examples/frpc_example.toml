###############################################################################
# frpc.toml — CLIENT CONFIGURATION FILE (fork MeoBaka/frp, v1.3.21.0.69.1.20 [DEV])
# Reference file with per-line explanations. DO NOT run it directly — copy the
# parts you need. TOML format.
###############################################################################

# =========================== 1. CONNECT TO SERVER ===========================

# IP address / hostname of frps (the server). IPv6 must be wrapped in square
# brackets in proxies, but serverAddr itself does not need it: serverAddr = "::".
serverAddr = "103.110.32.128"
# frps control port (matches bindPort on frps). Default 7000.
serverPort = 7000

# User name — if set, every proxy becomes {user}.{proxy} (e.g. "tuan.ssh").
# Leave empty if you do not need multi-user.
# user = "tuan"
# Optional identifier for this frpc instance.
# clientID = "pc-1"

# STUN server for NAT hole punching (used by xtcp/xudp/xtcp+xudp). Defaults to
# frp's public server. Change it if you run your own STUN.
# natHoleStunServer = "stun.easyvoip.com:3478"

# true = exit the program if the FIRST login fails; false = keep retrying forever.
# Default true. Set false for a self-recovering background service.
loginFailExit = false

# =============================== 2. AUTHENTICATION ==========================

auth.method = "token"             # "token" (simple) or "oidc"
auth.token  = "CHANGE_THIS_TOKEN" # MUST match auth.token on frps
# Or read the token from a file (mutually exclusive with auth.token above):
# auth.tokenSource.type = "file"
# auth.tokenSource.file.path = "/etc/frp/token"
# Also attach auth to heartbeats / work conns (more secure, must match frps):
# auth.additionalScopes = ["HeartBeats", "NewWorkConns"]

# =============================== 3. LOG ====================================

log.to    = "console"   # "console" or a file path, e.g. "./frpc.log"
log.level = "info"      # trace | debug | info | warn | error
log.maxDays = 3
log.disablePrintColor = false

# ==================== 4. WEB DASHBOARD / ADMIN API (frpc) ===================
# Enable to manage frpc over HTTP (reload, add/edit proxies from the UI).
# Remove this block if you do not need it.
webServer.addr = "127.0.0.1"   # 0.0.0.0 to allow access from other machines
webServer.port = 7400
webServer.user = "admin"
webServer.password = "admin"
# webServer.pprofEnable = false   # enable golang pprof for performance debugging

# ============================= 5. TRANSPORT ================================

# Protocol used to reach frps: tcp | kcp | quic | websocket | wss. Default tcp.
transport.protocol = "tcp"

# >>> THIS FORK'S DIFFERENCE <<<
# wireProtocol = the internal frpc<->frps message framing codec: "v1" or "v2".
# This fork DEFAULTS to "v2" (the original v1 is weaker security-wise). v2 uses
# AEAD encryption and is safer.
# Only set "v1" if you must talk to an OLD frps that does not support v2.
# Leave unset = v2 is used automatically. Set it explicitly so the dashboard shows it:
transport.wireProtocol = "v2"

# TCP multiplexing — pack many streams into one TCP connection. Default true.
# MUST match frps. Disable (false) for high-throughput flows that need many conns.
# transport.tcpMux = true
# transport.tcpMuxKeepaliveInterval = 30

# Number of pre-established connections in the pool (lowers latency for new
# requests). Default 0.
transport.poolCount = 5

# Timeout / keepalive when dialing the server (seconds).
# transport.dialServerTimeout = 10
# transport.dialServerKeepalive = 7200

# TLS: encrypt the control channel to frps. Enabled by default since v0.50.0.
transport.tls.enable = true
# transport.tls.certFile = "client.crt"
# transport.tls.keyFile  = "client.key"
# transport.tls.trustedCaFile = "ca.crt"
# transport.tls.serverName = "example.com"

# Heartbeat: keeps the connection alive + detects drops. Default interval 30,
# timeout 90 (seconds). Set a negative number to disable. NOT recommended to change.
# transport.heartbeatInterval = 30
# transport.heartbeatTimeout  = 90

# Options for protocol = "quic":
# transport.quic.keepalivePeriod = 10
# transport.quic.maxIdleTimeout = 30
# transport.quic.maxIncomingStreams = 100000

# Intermediate proxy used to reach frps (only when protocol = tcp):
# transport.proxyURL = "socks5://user:pass@192.168.1.128:1080"

# ============================ 6. MISC OPTIONS ==============================

# UDP packet size (bytes), must match frps. Affects udp/sudp/xudp. Default 1500.
udpPacketSize = 1500

# Only run proxies whose names are in this list (global allowlist). Empty = run all.
# start = ["rdp", "ssh"]
# Or enable/disable each proxy with the enabled = false field (preferred over 'start').

# Metadata sent along (usable by server-side plugins):
# metadatas.env = "prod"

# Load additional proxy configuration files:
# includes = ["./confd/*.toml"]

###############################################################################
#                              PROXIES (PROVIDER SIDE)
# Each [[proxies]] = one local service you want to expose. name MUST be unique.
###############################################################################

# ------------------------------- tcp: a TCP port ----------------------------
[[proxies]]
name = "ssh"
type = "tcp"
localIP = "127.0.0.1"      # local service IP (default 127.0.0.1)
localPort = 22             # local service port
remotePort = 6001          # public port opened on frps (0 = random)
# enabled = true           # false to disable this proxy without deleting it
# transport.useEncryption  = false   # extra encryption for just this proxy
# transport.useCompression = false   # compress the data
# transport.bandwidthLimit = "1MB"   # bandwidth limit (KB/MB)
# transport.bandwidthLimitMode = "client"   # "client" or "server"
# Health check: frps auto-removes the proxy if the local service dies
# healthCheck.type = "tcp"
# healthCheck.timeoutSeconds = 3
# healthCheck.maxFailed = 3
# healthCheck.intervalSeconds = 10
# Load balancing across multiple proxies in the same group:
# loadBalancer.group = "web"
# loadBalancer.groupKey = "secret"

# ------------------------------- udp: a UDP port ----------------------------
[[proxies]]
name = "dns"
type = "udp"
localIP = "114.114.114.114"
localPort = 53
remotePort = 6002

# --------------------------- http: web by domain ----------------------------
[[proxies]]
name = "web"
type = "http"
localIP = "127.0.0.1"
localPort = 80
customDomains = ["web.example.com"]   # domain pointing to frps
# subdomain = "web"                    # or use a subdomain (needs subDomainHost on frps)
# locations = ["/", "/api"]            # route by path (http only)
# httpUser = "admin"                   # basic-auth
# httpPassword = "admin"
# hostHeaderRewrite = "example.com"

# ------------------------------ https by domain -----------------------------
[[proxies]]
name = "web-secure"
type = "https"
localIP = "127.0.0.1"
localPort = 8443
customDomains = ["secure.example.com"]

# --------------------- stcp: secret TCP (via relay, keyed) ------------------
# Opens no public port; another machine needs an frpc "visitor" + the matching
# secretKey to get in.
[[proxies]]
name = "secret-ssh"
type = "stcp"
secretKey = "SECRET_KEY"
localIP = "127.0.0.1"
localPort = 22
# allowUsers = ["*"]   # only these users may connect; "*" = any user

# --------------------- sudp: secret UDP (via relay, keyed) ------------------
[[proxies]]
name = "secret-dns"
type = "sudp"
secretKey = "SECRET_KEY"
localIP = "127.0.0.1"
localPort = 53

# ================== xtcp: P2P TCP (NAT hole punching, NO relay) ==============
[[proxies]]
name = "p2p-ssh"
type = "xtcp"
secretKey = "SECRET_KEY"
localIP = "127.0.0.1"
localPort = 22
# allowUsers = ["user1", "user2"]
# [proxies.natTraversal]
# disableAssistedAddrs = false   # true = only use public addresses from STUN

# ============ >>> NEW: xudp — P2P UDP (NAT hole punching for UDP) <<< =========
# Not in upstream frp. Like xtcp but carries UDP. No fallbackTo (UDP does not need it).
[[proxies]]
name = "p2p-game"
type = "xudp"
secretKey = "SECRET_KEY"
localIP = "127.0.0.1"
localPort = 27015
# allowUsers = ["*"]

# ====== >>> NEW: xtcp+xudp — COMBINE TCP+UDP over 1 HOLE (tailscale-style) <<< =
# One proxy carries BOTH TCP and UDP to localPort over the SAME NAT hole.
# Perfect for REMOTE DESKTOP (RDP uses TCP 3389 + UDP 3389 for smoothness).
[[proxies]]
name = "pc-rdp"
type = "xtcp+xudp"
secretKey = "KEY_RDP"
localIP = "127.0.0.1"      # or the LAN IP of the machine with RDP, e.g. 192.168.100.19
localPort = 3389          # used for BOTH TCP and UDP
# localPortUDP = 3389      # (optional) change if UDP uses a different port; default = localPort

# ====== >>> NEW: tcp+udp — COMBINE TCP+UDP on 1 PUBLIC PORT (real type) <<< ====
# A SINGLE proxy that opens BOTH TCP and UDP on the SAME remotePort at frps (like
# RDP: TCP 3389 + UDP 3389). Not sugar — shown as exactly 1 proxy on both frpc and frps.
# localPortUDP defaults to localPort (set it if the UDP service listens elsewhere).
[[proxies]]
name = "voice"
type = "tcp+udp"
localPort = 8000
remotePort = 9000
# localPortUDP = 8001   # (optional) different local UDP port; default = localPort

# ====== >>> NEW: stcp+sudp — COMBINE TCP+UDP SECRETLY over RELAY (real type) <<<
# The secret version of tcp+udp: opens no public port, reached via a visitor that
# holds the same secretKey. One proxy carries both TCP and UDP; needs the matching
# "stcp+sudp" visitor below.
[[proxies]]
name = "priv"
type = "stcp+sudp"
secretKey = "KEY_PRIV"
localPort = 22
# localPortUDP = 22    # (optional) default = localPort
# (http+https was REMOVED: once you have SSL nobody serves plain http anymore)

# ============ >>> NEW: mc — MINECRAFT host-based routing (real type) <<< ========
# Route MANY Minecraft (Java Edition) servers through ONE public port, picking the
# backend by the hostname in the client handshake (like HTTPS routes by TLS SNI).
# NO frps config needed: the public port is declared HERE via remotePort. Proxies
# that share the same remotePort share one listener and are routed by customDomains
# (even across different frpc clients). See https://github.com/fatedier/frp/issues/5390
[[proxies]]
name = "mc-survival"
type = "mc"
localIP = "127.0.0.1"
localPort = 25565
remotePort = 25565                        # public Minecraft port on frps (declared here)
customDomains = ["survival.example.com"]  # address players connect with
# A second server sharing the SAME public port, told apart by hostname:
# [[proxies]]
# name = "mc-creative"
# type = "mc"
# localPort = 25566
# remotePort = 25565                       # SAME port -> multiplexed by host
# customDomains = ["creative.example.com"]

# ========= >>> NEW: pe — MINECRAFT BEDROCK host-based routing (real type) <<< ===
# Bedrock counterpart of "mc". Bedrock is UDP/RakNet and only carries the hostname
# inside the login packet, so frpc runs a full Bedrock router (gophertunnel): it
# reads the login ServerAddress and forwards to the matching local server. frps
# just opens the UDP port and tunnels (no gophertunnel on frps).
# NOTE: backend Bedrock servers must run in OFFLINE mode (online-mode=false).
# Inspired by WaterdogPE forced_hosts.
[[proxies]]
name = "bedrock"
type = "pe"
remotePort = 19132                          # public UDP port on frps
[proxies.forcedHosts]                        # host the player types -> local Bedrock server
"survival.example.com" = "127.0.0.1:19133"
"creative.example.com" = "127.0.0.1:19134"

# ----------------------- example: plugin instead of localPort ---------------
# [[proxies]]
# name = "socks5"
# type = "tcp"
# remotePort = 6005
# [proxies.plugin]
# type = "socks5"
# username = "abc"
# password = "abc"

###############################################################################
#                            VISITORS (ACCESSOR SIDE)
# Run on the machine that WANTS TO REACH the stcp/sudp/xtcp/xudp/xtcp+xudp
# services above.
###############################################################################

# --------------------------- visitor for stcp -------------------------------
[[visitors]]
name = "secret-ssh-visitor"
type = "stcp"
serverName = "secret-ssh"   # matches the proxy name on the provider
secretKey = "SECRET_KEY"
bindAddr = "127.0.0.1"      # opens a local port for you to connect to
bindPort = 6022             # e.g.: ssh 127.0.0.1 -p 6022

# --------------------------- visitor for xtcp (P2P) -------------------------
[[visitors]]
name = "p2p-ssh-visitor"
type = "xtcp"
serverName = "p2p-ssh"
secretKey = "SECRET_KEY"
bindAddr = "127.0.0.1"
bindPort = 6023
# serverUser = "user1"        # if the proxy belongs to another user
keepTunnelOpen = true         # punch the hole ahead of time -> fast connect, no wait
# maxRetriesAnHour = 8
# minRetryInterval = 90
# fallbackTo = "secret-ssh-visitor"   # if hole punching fails, fall back to stcp (relay)
# fallbackTimeoutMs = 1000

# ------------------ >>> NEW: visitor for xudp (P2P UDP) <<< ------------------
[[visitors]]
name = "p2p-game-visitor"
type = "xudp"
serverName = "p2p-game"
secretKey = "SECRET_KEY"
bindAddr = "127.0.0.1"
bindPort = 27015
keepTunnelOpen = true
# NOTE: xudp has NO fallbackTo (UDP packet loss is normal).

# ========== >>> NEW: visitor for xtcp+xudp — REACH REMOTE DESKTOP <<< ========
# Has built-in AUTO-FALLBACK: it tries P2P hole punching first; if fallbackTimeoutMs
# is exceeded without punching through (difficult NAT / symmetric / CGNAT) it
# AUTOMATICALLY switches to relay via frps (like stcp+sudp) — no extra visitor to
# declare. RDP still works, just a bit slower since it goes through frps.
[[visitors]]
name = "pc-rdp-visitor"
type = "xtcp+xudp"
serverName = "pc-rdp"
secretKey = "KEY_RDP"
bindAddr = "127.0.0.1"
bindPort = 13389            # -> open mstsc, type 127.0.0.1:13389 to reach the Desktop
keepTunnelOpen = true
# fallbackTimeoutMs = 1000  # (optional) how long to wait for P2P before falling back; default 1000

# ========== >>> NEW: visitor stcp+sudp — real type, 1 visitor <<< ============
# Symmetric to the "stcp+sudp" proxy (a real type, NOT sugar). serverName points
# straight at the "priv" proxy name. The visitor binds BOTH TCP and UDP on the same
# bindPort; each stream carries a 1-byte tag so the provider frpc routes it to the
# correct TCP/UDP service.
[[visitors]]
name = "priv-visitor"
type = "stcp+sudp"
serverName = "priv"         # matches the "priv" proxy name directly
secretKey = "KEY_PRIV"
bindAddr = "127.0.0.1"
bindPort = 6100             # opens BOTH TCP and UDP at 127.0.0.1:6100
