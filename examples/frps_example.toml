###############################################################################
# frps.toml — SERVER CONFIGURATION FILE (fork MeoBaka/frp, v1.3.21.0.69.1.20 [DEV])
# Runs on a VPS/machine with a public IP (or an openable port). Reference file
# with per-line explanations. TOML format.
###############################################################################

# =========================== 1. MAIN LISTENERS ============================

# Bind address. 0.0.0.0 = all interfaces. IPv6: bindAddr = "::".
bindAddr = "0.0.0.0"
# Main control port (frpc connects here). MUST match serverPort on frpc.
bindPort = 7000

# UDP port for the KCP protocol (may match bindPort). Omit = disable KCP.
# kcpBindPort = 7000
# UDP port for the QUIC protocol. Omit = disable QUIC.
# quicBindPort = 7002

# Address the proxies will listen on (default = bindAddr).
# proxyBindAddr = "127.0.0.1"

# NOTE ON wireProtocol (v1/v2):
# frps does NOT need wireProtocol configured — it AUTO-DETECTS from the "magic" the client sends.
# The client (this fork) defaults to v2 -> frps uses v2. A v1 client -> frps uses v1.
# So the server needs no configuration; just build from this fork to understand v2.

# =========================== 2. AUTHENTICATION ============================

auth.method = "token"           # "token" or "oidc"
auth.token  = "CHANGE_THIS_TOKEN"   # MUST match auth.token on frpc
# auth.additionalScopes = ["HeartBeats", "NewWorkConns"]
# auth.tokenSource.type = "file"
# auth.tokenSource.file.path = "/etc/frp/token"
# OIDC (if auth.method = "oidc"):
# auth.oidc.issuer = ""
# auth.oidc.audience = ""

# ============================ 3. TRANSPORT ================================

# Max connections kept ready in the pool per proxy. Default 5.
transport.maxPoolCount = 5

# TCP multiplexing — MUST match frpc. Default true.
# transport.tcpMux = true
# transport.tcpMuxKeepaliveInterval = 30
# transport.tcpKeepalive = 7200

# Heartbeat timeout (seconds). Default 90. Negative = disabled.
# transport.heartbeatTimeout = 90

# TLS: force = true means ONLY accept TLS connections (reject non-TLS clients).
transport.tls.force = false
# transport.tls.certFile = "server.crt"
# transport.tls.keyFile  = "server.key"
# transport.tls.trustedCaFile = "ca.crt"

# QUIC options (if quicBindPort is enabled):
# transport.quic.keepalivePeriod = 10
# transport.quic.maxIdleTimeout = 30
# transport.quic.maxIncomingStreams = 100000

# ===================== 4. VIRTUAL HOST (HTTP/HTTPS) =======================
# Enable if using the http/https proxy types (domain-based routing).
vhostHTTPPort  = 80
vhostHTTPSPort = 443
# vhostHTTPTimeout = 60   # timeout for reading response headers (seconds)

# If set, frpc can use subdomains for http/https.
# subdomain "test" -> routed host is test.frps.com
# subDomainHost = "frps.com"

# tcpmux over HTTP CONNECT on a single port (0 = disabled).
# tcpmuxHTTPConnectPort = 1337
# tcpmuxPassthrough = false

# ======================= 5. WEB DASHBOARD (frps UI) =======================
# Enable to view clients/proxies/traffic. Only active when webServer.port is set.
webServer.addr = "127.0.0.1"    # 0.0.0.0 to view from another machine
webServer.port = 7500
webServer.user = "admin"
webServer.password = "admin"
# webServer.tls.certFile = "server.crt"
# webServer.tls.keyFile  = "server.key"
# webServer.pprofEnable = false

# Expose Prometheus metrics at /metrics on the webServer.
enablePrometheus = true

# ================================ 6. LOG =================================

log.to    = "console"    # "console" or "./frps.log"
log.level = "info"       # trace | debug | info | warn | error
log.maxDays = 3
log.disablePrintColor = false

# Send detailed errors (with debug info) to frpc. Default true.
detailedErrorsToClient = true

# ============================ 7. LIMITS / MISC ============================

# Only allow frpc to open ports in this list. Omit = no limit.
# allowPorts = [
#   { start = 2000, end = 3000 },
#   { single = 3001 },
# ]

# Max ports per client. 0 = unlimited.
maxPortsPerClient = 0

# NOTE (fork): the "mc" (Java) and "pe" (Bedrock) host-routing proxy types need NO
# config here — their public port is declared on frpc via remotePort and opened on
# demand. "pe" runs the Bedrock router on frpc, so frps stays gophertunnel-free.
# Both still respect allowPorts / maxPortsPerClient.

# Maximum wait time for a work connection (seconds).
# userConnTimeout = 10

# UDP packet size (bytes), MUST match frpc. Affects udp/sudp/xudp. Default 1500.
udpPacketSize = 1500

# Hours to retain NAT hole-punching analysis data (used for xtcp/xudp/xtcp+xudp).
# frps acts as the hole-punching "matchmaker" for P2P types — required for them to work.
# (NatHoleController is always initialized; no need to enable it manually.)
natholeAnalysisDataReserveHours = 168

# =========================== 8. SSH TUNNEL GATEWAY ========================
# Allow using `ssh -R` to create tunnels without frpc. Omit = disabled.
# sshTunnelGateway.bindPort = 2200
# sshTunnelGateway.authorizedKeysFile = "/home/frp-user/.ssh/authorized_keys"

# ============================ 9. HTTP PLUGINS ============================
# External plugins handle events (Login, NewProxy...) over HTTP. Omit if unused.
# [[httpPlugins]]
# name = "user-manager"
# addr = "127.0.0.1:9000"
# path = "/handler"
# ops = ["Login"]
